# ─────────────────────────────────────────────────────────────
# ResQNet — Docker Compose for Local Development
# Spins up MongoDB, Redis, backend API, and frontend.
# ─────────────────────────────────────────────────────────────

services:
  # ─── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: resqnet-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: resqnet
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: resqnet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resqnet-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./backend/src:/app/src  # Hot reload in dev
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 5001
      MONGODB_URI: mongodb://mongodb:27017/resqnet
      REDIS_URL: redis://redis:6379
      JWT_SECRET: resqnet_dev_jwt_secret_change_in_production_32chars
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CLIENT_URL: http://localhost:3000,http://localhost:3001
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend (Next.js) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: resqnet-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:5001
    depends_on:
      - backend

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
